<!DOCTYPE html>
<html>

<head>
    <title>About</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Lucide (ONLY ONCE, in head) -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans&display=swap" rel="stylesheet">

    <!-- Font Awesome (optional, you can remove if not used) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link rel="icon" href="logo.jpeg">

    <style>
        body {
            font-family: 'DM Sans', sans-serif;
        }
    </style>
</head>

<body class="bg-slate-900 text-white">

    <!-- HEADER -->
    <div id="header"></div>

    <!-- HERO CTA -->
    <section class="max-w-5xl mx-auto px-6 py-16 text-center">

        <div class="bg-white/10 backdrop-blur rounded-2xl p-10 shadow-lg">

            <h1 class="text-3xl md:text-4xl font-bold mb-4">
                Ready to Help Us Change Lives?
            </h1>

            <p class="opacity-80 max-w-2xl mx-auto mb-8">
                Whether you're a dental professional, educator, or simply someone who cares —
                there's a place for you in our mission. Every contribution makes a difference.
            </p>

            <div class="flex flex-col sm:flex-row justify-center gap-4">

                <a href="get-involved.html"
                    class="px-6 py-3 rounded-full bg-green-500 hover:bg-green-600 transition">
                    Get Involved
                </a>

                <a href="about.html"
                    class="px-6 py-3 rounded-full border border-white/30 hover:bg-white/10 transition">
                    Partner With Us
                </a>

            </div>

        </div>

    </section>

    <!-- CONTACT -->
    <section class="max-w-xl mx-auto p-10">

        <h1 class="text-3xl mb-6">Contact Us</h1>

        <form class="space-y-4">
            <input class="w-full p-2 rounded text-black" placeholder="Name">
            <input class="w-full p-2 rounded text-black" placeholder="Email">
            <input class="w-full p-2 rounded text-black" placeholder="Phone">
            <textarea class="w-full p-2 rounded text-black" placeholder="Message"></textarea>

            <button class="bg-green-500 px-6 py-2 rounded hover:bg-green-600 transition">
                Send
            </button>
        </form>

    </section>

    <!-- FOOTER -->
    <div id="footer"></div>

    <!-- SCRIPT (ONLY ONE BLOCK) -->
    <script>
        // Load header
        fetch('header.html')
            .then(res => res.text())
            .then(data => {
                document.getElementById('header').innerHTML = data;

                // Mobile menu toggle
                const toggle = document.getElementById("menuToggle");
                const menu = document.getElementById("mobileMenu");

                if (toggle && menu) {
                    toggle.addEventListener("click", () => {
                        menu.classList.toggle("hidden");
                    });
                }

                // Init icons AFTER header loads
                lucide.createIcons();
            });

        // Load footer
        fetch('footer.html')
            .then(res => res.text())
            .then(data => {
                document.getElementById('footer').innerHTML = data;

                // Init icons AFTER footer loads
                lucide.createIcons();
            });
    </script>

</body>

</html>
