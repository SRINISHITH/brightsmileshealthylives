<!DOCTYPE html>
<html>

<head>
  <title>Home</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- ✅ Lucide (ONLY ONCE, in head) -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans&display=swap" rel="stylesheet">

  <!-- Font Awesome (optional) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <link rel="icon" href="logo.jpeg">

  <style>
    body {
      font-family: 'DM Sans', sans-serif;
    }
  </style>
</head>

<body class="bg-slate-900 text-white">

  <!-- HEADER -->
  <div id="header"></div>

  <!-- HERO -->
  <section class="h-[90vh] flex items-center justify-center text-center"
    style="background:url('https://images.unsplash.com/photo-1584515933487-779824d29309') center/cover;">

    <div class="bg-black/50 p-10 rounded-xl">

      <h1 class="text-4xl md:text-6xl font-bold leading-tight">
        Every Smile Deserves to
        <span class="italic text-green-400">Shine</span>
      </h1>

      <p class="mt-6 text-lg opacity-80">
        We are committed to improving dental and skin health in underserved
        communities by providing education and access to essential care products,
        because healthy habits start with resources.
      </p>

      <!-- CTA Buttons -->
      <div class="mt-8 flex flex-col sm:flex-row justify-center gap-4">

        <a href="get-involved.html"
          class="px-8 py-3 rounded-full bg-green-500 hover:bg-green-600 transition">
          Get Involved
        </a>

        <a href="about.html"
          class="px-8 py-3 rounded-full border border-white/30 hover:bg-white/10 transition">
          Learn More
        </a>

      </div>

    </div>

  </section>

  <!-- FOOTER -->
  <div id="footer"></div>

  <!-- ✅ SINGLE SCRIPT BLOCK -->
  <script>
    // Load header
    fetch('header.html')
      .then(res => res.text())
      .then(data => {
        document.getElementById('header').innerHTML = data;

        // Mobile menu toggle
        const toggle = document.getElementById("menuToggle");
        const menu = document.getElementById("mobileMenu");

        if (toggle && menu) {
          toggle.addEventListener("click", () => {
            menu.classList.toggle("hidden");
          });
        }

        // Init icons AFTER header loads
        lucide.createIcons();
      });

    // Load footer
    fetch('footer.html')
      .then(res => res.text())
      .then(data => {
        document.getElementById('footer').innerHTML = data;

        // Init icons AFTER footer loads
        lucide.createIcons();
      });
  </script>

</body>

</html>
